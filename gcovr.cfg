root = .
search-path = build

filter = Base64*
filter = RRCP*
filter = async_*
filter = examples/*
filter = rrcp_*
# NO! filter = tests/*
exclude = tests
exclude = rrcp_message.hpp

# exclude-directories = build/_deps
exclude-directories = coverage
exclude-directories = doc
exclude-directories = stagedir
exclude-directories = .cache
exclude-directories = .direnv
exclude-directories = .venv

gcov-ignore-parse-errors = all
print-summary = yes

html-details = coverage/gcovr.html

