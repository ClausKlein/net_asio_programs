name: CMake on multiple platforms

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:
  schedule:
    - cron: '30 15 * * 6'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [debug, release]
        c_compiler: [gcc, clang, cl]
        include:
          # Windows - MSVC
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
            preset: msvc

          # Ubuntu - GCC
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            preset: gcc

          # Ubuntu - Clang
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
            preset: llvm

          # macOS - Clang (default compiler)
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
            preset: appleclang

        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc
          - os: macos-latest
            c_compiler: cl

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # # see https://github.com/marketplace/actions/enable-developer-command-prompt
      - uses: ilammy/msvc-dev-cmd@v1
        if: matrix.os == 'windows-latest'
        with:
          vsversion: 2022
          arch: x64

      - name: Workflow preset ${{ matrix.preset }}-${{ matrix.build_type }}
        env:
          CC: ${{ matrix.c_compiler }}
          CXX: ${{ matrix.cpp_compiler }}
        run: |
          cmake --workflow --preset ${{ matrix.preset }}-${{ matrix.build_type }}
