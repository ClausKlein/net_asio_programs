name: GCC

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:
  schedule:
    - cron: '30 15 * * 6'

jobs:
  gcc:
    strategy:
      fail-fast: false
      matrix:
        version: [15, 16]

    runs-on: ubuntu-latest

    container:
      image: ghcr.io/mattkretz/cplusplus-ci/gcc${{ matrix.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }

      - name: Install Boost
        run: sudo apt-get update && sudo apt-get install -y libboost-all-dev

      - name: Setup Cpp
        uses: aminya/setup-cpp@v1
        with:
          # compiler: gnu-${{ matrix.version }}
          cmake: 4.1.2
          ninja: 1.13.0
          gcovr: true

      - name: Run test suite
        env:
          CXX: g++-${{ matrix.version }}
        run: |
          export PATH=$HOME/.local/bin:$PATH
          PRESET_NAME=gcc-release make test
